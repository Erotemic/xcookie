[tool.ruff]
target-version = "py38"
line-length = 80
format.indent-style = "space"
format.quote-style = "single"
format.line-ending = "auto"
format.skip-magic-trailing-comma = false
format.docstring-code-format = false
# Enable Flake8 (E, F) and isort (I) rules.
lint.select = [ "E", "F", "I" ]
# Ignore specific rules, for example, E501 (line too long) as it's handled by the formatter.
lint.ignore = [
  "E402", # Module level import not at top of file
  "E501", # line too long
]

[tool.codespell]
skip = [ "./docs/build", "./*.egg-info", "./build", "./htmlcov" ]
count = true
quiet-level = 3
ignore-words-list = [ "wont", "cant", "ANS", "doesnt", "arent", "ans", "thats", "datas", "isnt" ]

[tool.mypy]
# Also should really not need this
ignore_missing_imports = true
overrides = [
  # This shoulnt be the case that we need to ignore ubelt.
  { module = [
    "ubelt",
  ], ignore_missing_imports = true },
]

[tool.ty]
overrides = [
  { include = [ "xcookie/main.py" ] },
  # ty 0.0.37 cannot narrow the value types in the **cli_kwargs dict
  # forwarded into scriptconfig.Config.cli in XCookieConfig.load_from_cli_and_pyproject.
  { rules.invalid-argument-type = "ignore" },
]
rules.unused-type-ignore-comment = "ignore"
rules.unresolved-import = "ignore"
# tmp
src.exclude = [
  # 'ubelt/util_path.py',
  # 'ubelt/util_stream.py'
]

[tool.pytest]
ini_options.addopts = "-p no:doctest --xdoctest --xdoctest-style=google --ignore-glob=setup.py"
ini_options.norecursedirs = ".git ignore build __pycache__ dev docs _skbuild"
ini_options.filterwarnings = [
  "default",
  "ignore:.*No cfgstr given in Cacher constructor or call.*:Warning",
  "ignore:.*Define the __nice__ method for.*:Warning",
  "ignore:.*private pytest class or function.*:Warning",
]

[tool.coverage]
run.branch = true
report.exclude_lines = [
  ".*  # nocover",
  ".*  # pragma: no cover",
  ".*if six.PY2:",
  "^ *pass *$",
  "^ *raise",
  "def __repr__",
  "if __name__ == .__main__.:",
  "if _debug:",
  "if 0:",
  "if trace is not None",
  "pragma: no cover",
  "raise AssertionError",
  "raise NotImplementedError",
  "verbose = .*",
]
report.omit = [
  "*/setup.py",
  "xcookie/__main__.py",
]

[tool.xcookie]
tags = [
  "erotemic",
  "github",
  "purepy",
]
mod_name = "xcookie"
repo_name = "xcookie"
author_email = "erotemic@gmail.com"
author = "Jon Crall"
url = "https://github.com/Erotemic/xcookie"
description = "The xcookie cookie-cutter Module"
min_python = "3.10"
# Reduce the CI load of this package, only test on old and new python versions
# ci_cpython_versions = ['3.7', '3.8', '3.10', '3.10', '3.11', '3.12', '3.13']
# ci_pypy_versions = 'auto'
ci_pypy_versions = []
ci_pypi_trusted_publishing = true
enable_gpg = true
deploy = true
deploy_pypi = true
ci_gpg_secret_transport = "direct_ci"
typed = true
ci_blocklist = [ { os = "*windows*", python-version = "*rc*" } ]
entry_points.console_scripts = [
  "xcookie=xcookie.__main__:main",
]
package_data.xcookie = [ "py.typed", "*.pyi" ]
package_data."xcookie.rc" = [ "*.in" ]
use_setup_py = false
use_pyproject_requirements = false
