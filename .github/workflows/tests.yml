# This workflow is autogenerated by xcookie.
# File kind: tests
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions
# Based on ~/code/xcookie/xcookie/builders/github_actions.py
# See: https://github.com/Erotemic/xcookie

name: PurePyCI

on:
  push:
  pull_request:
    branches: [ main, dev/0.3.4 ]

jobs:
  lint_job:
    ##
    # Run quick linting and typing checks.
    # To disable all linting add "linter=false" to the xcookie config.
    # To disable type checks add "notypes" to the xcookie tags.
    ##
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Set up Python 3.14 for linting
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.14'
    - name: Install dependencies
      run: |-
        python -m pip install pip uv -U
        python -m uv pip install flake8
    - name: Lint with flake8
      run: |-
        # stop the build if there are Python syntax errors or undefined names
        flake8 ./xcookie --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Typecheck
      run: |-
        python -m pip install ty
        pip install -r requirements/runtime.txt
        # ty is still evolving; keep this informational until annotations settle.
        ty check ./xcookie || true

  build_and_test_sdist:
    ##
    # Build the pure python package from source and test it in the same environment.
    ##
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Set up Python 3.14
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.14'
    - name: Upgrade pip
      run: |-
        python -m pip install pip uv -U
        python -m pip install --prefer-binary -r requirements/tests.txt
        python -m pip install --prefer-binary -r requirements/runtime.txt
    - name: Build sdist
      shell: bash
      run: |-
        python -m pip install pip uv -U
        python -m uv pip install setuptools>=0.8 wheel build twine
        python -m build --sdist --outdir wheelhouse
        python -m twine check ./wheelhouse/xcookie*.tar.gz
    - name: Install sdist
      run: |-
        ls -al wheelhouse
        python -m pip install --prefer-binary wheelhouse/xcookie*.tar.gz -v
    - name: Test sdist
      run: |-
        pwd
        ls -al
        WORKSPACE_DNAME="testsrcdir_${CI_PYTHON_VERSION}_${GITHUB_RUN_ID}_${RUNNER_OS}"
        mkdir -p $WORKSPACE_DNAME
        cd $WORKSPACE_DNAME
        MOD_DPATH=$(python -c "import xcookie, os; print(os.path.dirname(xcookie.__file__))")
        echo "MOD_DPATH = $MOD_DPATH"
        python -m pytest --verbose --cov=xcookie $MOD_DPATH ../tests
        cd ..
    - uses: actions/upload-artifact@v6.0.0
      name: Upload sdist artifact
      with:
        name: sdist_wheels
        path: ./wheelhouse/xcookie*.tar.gz

  build_purepy_wheels:
    ##
    # Build the pure-python wheels independently on a per-platform basis.
    ##
    name: ${{ matrix.python-version }} on ${{ matrix.os }}, arch=${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        python-version:
        - '3.14'
        arch:
        - auto
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3.7.0
      if: runner.os == 'Linux' && matrix.arch != 'auto'
      with:
        platforms: all
    - name: Setup Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Build pure wheel
      shell: bash
      run: |-
        python -m pip install pip uv -U
        python -m uv pip install setuptools>=0.8 wheel build twine
        python -m build --wheel --outdir wheelhouse
        python -m twine check ./wheelhouse/xcookie*.whl
    - name: Show built files
      shell: bash
      run: ls -la wheelhouse
    - uses: actions/upload-artifact@v6.0.0
      name: Upload wheels artifact
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.arch }}
        path: ./wheelhouse/xcookie*.whl

  test_purepy_wheels:
    ##
    # Download and test the pure-python wheels that were built in the build step.
    ##
    name: ${{ matrix.python-version }} on ${{ matrix.os }} with ${{ matrix.install-profile }}
    if: "! startsWith(github.event.ref, 'refs/heads/release')"
    runs-on: ${{ matrix.os }}
    needs:
    - build_purepy_wheels
    strategy:
      fail-fast: false
      matrix:
        include:
        - python-version: '3.10'
          install-profile: ci-minimal-strict
          install-lockfile: requirements/locks/pylock.ci-minimal-strict.toml
          os: ubuntu-latest
        - python-version: '3.14'
          install-profile: ci-full-strict
          install-lockfile: requirements/locks/pylock.ci-full-strict.toml
          os: ubuntu-latest
        - python-version: '3.10'
          install-profile: loose-full
          install-extras: tests,optional
          os: ubuntu-latest
        - python-version: '3.14'
          install-profile: loose-full
          install-extras: tests,optional
          os: macOS-latest
        - python-version: '3.14'
          install-profile: loose-full
          install-extras: tests,optional
          os: windows-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v6.0.2
    - name: Enable MSVC 64bit
      uses: ilammy/msvc-dev-cmd@v1
      if: ${{ startsWith(matrix.os, 'windows-') }}
      with:
        arch: ${{ contains(matrix.os, 'arm') && 'arm64' || 'x64' }}
    - name: Setup Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
    - uses: actions/download-artifact@v4.1.8
      name: Download wheels
      with:
        pattern: wheels-*
        merge-multiple: true
        path: wheelhouse
    - name: Install wheel ${{ matrix.install-profile }}
      shell: bash
      env:
        INSTALL_EXTRAS: ${{ matrix.install-extras }}
        INSTALL_LOCKFILE: ${{ matrix.install-lockfile }}
      run: |-
        echo "Finding the path to the wheel"
        ls wheelhouse || echo "wheelhouse does not exist"
        echo "Installing helpers: update pip"
        python -m pip install pip uv -U
        echo "Installing helpers: setuptools"
        python -m uv pip install setuptools>=0.8 setuptools_scm wheel build -U
        echo "Installing helpers: tomli and pkginfo"
        python -m uv pip install tomli pkginfo packaging
        export WHEEL_FPATH=$(python -c "if 1:
            import pathlib
            from packaging import tags
            from packaging.utils import parse_wheel_filename
            dist_dpath = pathlib.Path('wheelhouse')
            wheels = sorted(dist_dpath.glob('xcookie*.whl'))
            if wheels:
                sys_tags = set(tags.sys_tags())
                matching = []
                for w in wheels:
                    try:
                        _, _, _, wheel_tags = parse_wheel_filename(w.name)
                    except Exception:
                        continue
                    if any(t in sys_tags for t in wheel_tags):
                        matching.append(w)
                fpath = sorted(matching or wheels)[-1]
            else:
                sdists = sorted(dist_dpath.glob('xcookie*.tar.gz'))
                if not sdists:
                    raise SystemExit('No wheel artifacts found in wheelhouse')
                fpath = sdists[-1]
            print(str(fpath).replace(chr(92), chr(47)))
        ")
        echo "WHEEL_FPATH=$WHEEL_FPATH"
        echo "INSTALL_EXTRAS=$INSTALL_EXTRAS"
        echo "INSTALL_LOCKFILE=$INSTALL_LOCKFILE"
        if [ -n "${INSTALL_LOCKFILE:-}" ]; then
            if [ ! -f "$INSTALL_LOCKFILE" ]; then
                python dev/make_lockfiles.py --profile "$(basename "$INSTALL_LOCKFILE" | sed 's/^pylock\.//; s/\.toml$//')"
            fi
            echo "Syncing locked test environment"
            uv pip sync "$INSTALL_LOCKFILE"
            echo "Installing wheel without dependency resolution"
            python -m pip install --no-deps "$WHEEL_FPATH"
            python -m pip check
        else
            echo "Installing wheel with extras"
            python -m pip install --prefer-binary "${WHEEL_FPATH}[${INSTALL_EXTRAS}]"
        fi
        echo "Install finished."
    - name: Test wheel ${{ matrix.install-profile }}
      shell: bash
      env:
        CI_PYTHON_VERSION: py${{ matrix.python-version }}
      run: |-
        echo "Creating test sandbox directory"
        export WORKSPACE_DNAME="testdir_${CI_PYTHON_VERSION}_${GITHUB_RUN_ID}_${RUNNER_OS}"
        echo "WORKSPACE_DNAME=$WORKSPACE_DNAME"
        mkdir -p $WORKSPACE_DNAME
        echo "cd-ing into the workspace"
        cd $WORKSPACE_DNAME
        pwd
        ls -altr
        export MOD_DPATH=$(python -c "import xcookie, os; print(os.path.dirname(xcookie.__file__))")
        export MOD_NAME=xcookie
        echo "MOD_DPATH=$MOD_DPATH"
        python -m pytest --verbose -p pytester -p no:doctest --xdoctest --cov-config ../pyproject.toml --cov-report term --durations=100 --cov="$MOD_NAME" "$MOD_DPATH" ../tests
        echo "pytest command finished, moving the coverage file to the repo root"
        ls -al
        mv .coverage "../.coverage.$WORKSPACE_DNAME"
        cd ..
        ls -al
    - name: Combine coverage Linux
      if: runner.os == 'Linux'
      run: |-
        echo '############ PWD'
        pwd
        cp .wheelhouse/.coverage* . || true
        ls -al
        uv pip install coverage[toml] | pip install coverage[toml]
        echo '############ combine'
        coverage combine . || true
        echo '############ XML'
        coverage xml -o ./coverage.xml || true
        ls -altr
        pwd
    - uses: codecov/codecov-action@v5.5.2
      name: Codecov Upload
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
